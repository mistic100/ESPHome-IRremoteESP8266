name: ESPHome Build Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install ESPHome
        run: |
          pip install -r requirements.txt

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('configurations/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Run ESPHome Validate
        run: |
          for config in ./configurations/*.yaml; do
            echo "--- Processing $config ---"
            esphome config "$config"
          done

      - name: Run ESPHome Compile
        run: |
          for config in ./configurations/*.yaml; do
            echo "--- Processing $config ---"
            esphome compile "$config"
          done
